name: Daily Stock Picks → Telegram

on:
  schedule:
    # 매일 22:13 UTC = 07:13 KST 다음날 (정각/30분 회피로 큐 지연 완화)
    - cron: '13 22 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily orchestrator
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONIOENCODING: utf-8
        run: python daily.py

      - name: Commit predictions snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain evaluation/)" ]; then
            git add evaluation/
            git commit -m "predictions snapshot $(date -u +%Y-%m-%d)"
            # 충돌 회피 위해 rebase pull 후 push
            git pull --rebase origin main || true
            git push
          else
            echo "변경 없음 — 커밋 스킵"
          fi
